# Builds one zip per skill and attaches them to the GitHub release.
# Each zip's root is the skill folder itself (the layout claude.ai and
# ChatGPT expect for skill upload) and includes LICENSE.md so the
# PolyForm Noncommercial notices travel with every copy.
name: Build skill zips

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build one zip per skill
        run: |
          mkdir -p dist
          for dir in skills/*/; do
            name=$(basename "$dir")
            if [ ! -f "$dir/SKILL.md" ]; then
              echo "skipping $name (no SKILL.md)"
              continue
            fi
            cp -n LICENSE.md "$dir/LICENSE.md" || true
            (cd skills && zip -r -X "../dist/${name}.zip" "$name" -x "*.DS_Store")
          done
          ls -l dist/

      - name: Attach zips to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.zip --clobber

      - name: Upload zips as workflow artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: skill-zips
          path: dist/*.zip
